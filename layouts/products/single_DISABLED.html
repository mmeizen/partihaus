<div class="product-detail">
  <div class="detail-image">
    {{ with .Params.image }}
      <img src="{{ . }}" alt="{{ $.Title }}">
    {{ end }}
  </div>

  <div class="detail-info">
    <h1 class="detail-name">{{ .Title }}</h1>
    <p class="detail-material">{{ .Params.material }}</p>

    <hr class="detail-divider">

    {{ .Content }}
  </div>
</div>
